# Site settings
title: Karl-Henrik
description: The random ramblings of Karl-Henrik "KH" Nilsson
url: 'http://localhost:4000'
baseurl: '/'
# google_analytics: 'UA-XXXXXX-X'
# disqus_shortname: 'your-disqus-name'
disqus_shortname: karlhenrik
google_analytics: UA-40159762-1

author:
  name: Karl-Henrik
  email: karl-henrik@mean.se
  github_username: karl-henrik
  twitter_username: khnilsson
  pinterest: 
  linkedin_username: khnilsson
  bio: Coder, speaker and passionate hardware hacker!
  email_md5: 27be4ce93d712f5342108d053b0ea6f8

defaults:
  -
    scope:
      path: ''
      type: 'posts'
    values:
        layout: 'post'

# Build settings
destination: _site
paginate: 10
permalink: /:year/:title/
markdown: kramdown
highlighter: rouge

kramdown:
  # use Github Flavored Markdown
  input: GFM
  # do not replace newlines by <br>s
  hard_wrap: false

gems: ['jekyll-paginate']
exclude: ['README.md', 'Gemfile', 'Gemfile.lock', 'screenshot.png']
